site_name: Zomi Spelling Guide
site_description: A comprehensive guide to Zomi language spelling, normalization, and writing conventions
site_author: Zomi Community
site_url: https://paumkim.github.io/zomi-website/
repo_url: https://github.com/paumkim/zomi-website
repo_name: zomi-website

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to system preference
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.tabs.link

extra:
  homepage: https://paumkim.github.io/zomi-website/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/paumkim/zomi-website

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Quick Guide: ZOMI_SPELLING_EXPLAINED.md
  - Full Reference: ZOMI_SPELLING_GUIDE.md
