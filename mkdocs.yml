site_name: Zomi Spelling Guide
site_description: Learn to write clean, consistent Zomi (Tedim/Zo). Spelling rules, grammar guide, word lists, example texts, golden textbooks, and free Zomi Bible download.
site_author: Zomi Community
site_url: https://paumkim.github.io/zomi-website/
site_keywords: zomi, tedim, zolai, zomi language, zomi spelling, zo language, tedim bible, zomi grammar, zomi dictionary, zomi writing, chin language, myanmar language
repo_url: https://github.com/paumkim/zomi-website
repo_name: zomi-website

theme:
  name: material
  favicon: assets/images/favicon.png
  logo: assets/images/favicon.png
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: deep purple
      toggle:
        icon: material/weather-night
        name: Switch to system preference
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - search.highlight
    - content.code.copy
    - content.tabs.link

extra:
  homepage: https://paumkim.github.io/zomi-website/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/paumkim/zomi-website

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - toc:
      permalink: true

docs_dir: src

extra_javascript:
  - assets/js/header-link.js

nav:
  - Home: index.md
  - Quick Guide: ZOMI_SPELLING_EXPLAINED.md
  - Full Reference: ZOMI_SPELLING_GUIDE.md
  - Intro to Zomi Writing: intro.md
  - Grammar Essentials: grammar.md
  - Particles & Word Structure: particles.md
  - Numbers: numbers.md
  - Example Texts: examples.md
  - 📚 Golden Textbooks: textbooks.md
  - 📖 Golden Lessons: ZOMI_GOLDEN_LESSONS.md
  - 📖 Tedim Bible: tedim_bible.md
  - 📝 Word Frequency: word_frequency.md
  - 💬 Common Phrases: phrases.md
