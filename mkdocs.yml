site_name: Zomi Language Guide
site_description: Learn to write clean, consistent Zomi (Tedim/Zo). Spelling rules, grammar, AI training, and the vision for a Zomi digital future.
site_author: Paumkim — Zomi Language Preservation
site_url: https://paumkim.github.io/zomi-website/
repo_url: https://github.com/paumkim/zomi-website
repo_name: zomi-website
copyright: Copyright &copy; 2026 Paumkim — Built for the Zomi community. Dammah! 🔥

theme:
  name: material
  favicon: assets/images/favicon.png
  logo: assets/images/favicon.png
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: deep orange
      toggle:
        icon: material/weather-sunny
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: deep orange
      toggle:
        icon: material/weather-night
        name: Switch to light mode
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.indexes
    - search.highlight
    - content.code.copy
    - content.tabs.link
    - content.action.edit

extra:
  homepage: https://paumkim.github.io/zomi-website/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/paumkim
      name: Paumkim on GitHub
    - icon: fontawesome/solid/robot
      link: https://huggingface.co/paumkim
      name: Paumkim on Hugging Face
    - icon: fontawesome/solid/globe
      link: https://paumkim.github.io/zomi-dataset
      name: Zomi Dataset

extra_css:
  - assets/css/custom.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - toc:
      permalink: true
  - attr_list

docs_dir: src

extra_javascript:
  - assets/js/header-link.js

nav:
  - Home: index.md
  - Spelling Guide:
    - Quick Guide: ZOMI_SPELLING_EXPLAINED.md
    - Full Reference: ZOMI_SPELLING_GUIDE.md
    - Intro to Zomi Writing: intro.md
    - Grammar Essentials: grammar.md
    - Particles & Word Structure: particles.md
    - Numbers: numbers.md
    - Example Texts: examples.md
  - 📚 Resources:
    - Golden Textbooks: textbooks.md
    - Golden Lessons: ZOMI_GOLDEN_LESSONS.md
    - Tedim Bible: tedim_bible.md
    - Word Frequency: word_frequency.md
    - Common Phrases: phrases.md
  - 🤖 AI & Future:
    - AI Training Guide: ai_training.md
    - Three Waves of AI: ai_adaptation.md
