site_name: Zomi Guide
site_description: Clean Zomi (Tedim/Zo) — spelling, grammar, AI training.
site_author: Paumkim
site_url: https://paumkim.github.io/zomi-website/
repo_url: https://github.com/paumkim/zomi-website
repo_name: zomi-website
copyright: Copyright &copy; 2026 Paumkim · Zomi Community · Dammaw! 🔥

theme:
  name: material
  favicon: assets/images/favicon.png
  logo: assets/images/favicon.png
  palette:
    scheme: slate
    primary: black
    accent: cyan
  font:
    text: JetBrains Mono
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.top
    - content.code.copy

extra:
  homepage: https://paumkim.github.io/zomi-website/
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/paumkim
      name: Paumkim on GitHub
    - icon: fontawesome/solid/robot
      link: https://huggingface.co/paumkim
      name: Paumkim on Hugging Face
    - icon: fontawesome/brands/github
      link: https://github.com/paumkim/zomi-dataset
      name: Zomi Dataset on GitHub

extra_css:
  - assets/css/custom.css

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.details
  - admonition
  - tables
  - toc:
      permalink: true
  - attr_list

docs_dir: src

extra_javascript:
  - assets/js/header-link.js

nav:
  - Home: index.md
  - Spelling Guide:
    - Quick Guide: ZOMI_SPELLING_EXPLAINED.md
    - Full Reference: ZOMI_SPELLING_GUIDE.md
    - Intro to Zomi Writing: intro.md
    - Grammar Essentials: grammar.md
    - Particles & Word Structure: particles.md
    - Numbers: numbers.md
    - Example Texts: examples.md
  - 📚 Resources:
    - Golden Textbooks: textbooks.md
    - Golden Lessons: ZOMI_GOLDEN_LESSONS.md
    - Word Frequency: word_frequency.md
    - Common Phrases: phrases.md
  - 📖 Laisiangtho:
    - Tedim Bible (1932): tedim_bible.md
  - 🤖 AI & Future:
    - Research Journal: research_journal.md
    - Levels of AI: ai_levels.md
    - Pure Language Engine: pure_language_engine.md
    - Agent Architecture: agent_architecture.md
    - AI Training Guide: ai_training.md
    - Three Waves of AI: ai_adaptation.md
