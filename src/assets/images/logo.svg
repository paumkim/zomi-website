      <stop offset="0%" style="stop-color:#82AAFF"/>
      <stop offset="100%" style="stop-color:#89DDFF"/>
    </linearGradient>
    <linearGradient id="bar-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#89DDFF"/>
      <stop offset="100%" style="stop-color:#C3E88D"/>
    </linearGradient>
  </defs>
  <!-- Left bar accent -->
  <rect x="0" y="4" width="4" height="52" rx="2" fill="url(#bar-grad)"/>
  <!-- Zomi text with accent bar between -->
